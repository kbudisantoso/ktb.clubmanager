name: SBOM & VEX

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  sbom:
    name: Generate SBOM & VEX
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate SBOM (CycloneDX)
        run: pnpm dlx @cyclonedx/cdxgen -o sbom.json --spec-version 1.6

      - name: Scan SBOM with Grype and generate VEX
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          sbom: sbom.json
          output-format: cyclonedx-json
          output-file: vex.json
          fail-build: false

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-cyclonedx
          path: sbom.json
          retention-days: 90

      - name: Upload VEX artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vex-cyclonedx
          path: vex.json
          retention-days: 90

      - name: Attest SBOM (on tag/release)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: sbom.json
          sbom-path: sbom.json
