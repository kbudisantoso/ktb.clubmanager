name: SBOM & VEX

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  sbom:
    name: Generate SBOM & VEX
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate SBOM (CycloneDX)
        run: pnpm dlx @cyclonedx/cdxgen -o sbom.json --spec-version 1.6

      - name: Scan SBOM with Grype and generate VEX
        uses: anchore/scan-action@2c901ab7378897c01b8efaa2d0c9bf519cc64b9e # v6.1.0
        with:
          sbom: sbom.json
          output-format: cyclonedx-json
          output-file: vex.json
          fail-build: false

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sbom-cyclonedx
          path: sbom.json
          retention-days: 90

      - name: Upload VEX artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: vex-cyclonedx
          path: vex.json
          retention-days: 90

      - name: Attest SBOM (on tag/release)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: sbom.json
          sbom-path: sbom.json
